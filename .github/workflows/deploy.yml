name: Build and deploy linkportal

# WHAT THIS DOES
# On every push to master (or when run manually), this workflow:
#   1. Builds the Docker image in GitHub's cloud (not your PC),
#   2. Pushes it to GitHub Container Registry (ghcr.io) — free, not an Azure resource,
#   3. Tells your Azure App Service to pull and run the new image.
# Result: deploying = "git push".

on:
  push:
    branches: [ master ]
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # allows pushing the image to ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ghcr.io image names must be lowercase; derive it from the repo name.
      - name: Compute image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # provided automatically by GitHub

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy image to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE_NAME }}:${{ github.sha }}
