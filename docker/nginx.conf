server {
    listen 8080;
    listen [::]:8080;
    root /var/www/html/public;
    index index.php index.html index.htm;
    server_name _;

    # Uploads: admin/vendor documents are capped at 20 MB in validation rules.
    client_max_body_size 30m;

    # FastCGI buffering (prevents 502s on larger responses).
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # ES modules (e.g. the pdf.js worker, *.mjs) must be served with a JS MIME
    # type or the browser refuses to load them as modules.
    location ~ \.mjs$ {
        types { }
        default_type text/javascript;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
