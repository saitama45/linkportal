[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

# --- Web server -------------------------------------------------------------
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- PHP-FPM ----------------------------------------------------------------
[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- Self-hosted OCR worker (Python FastAPI, localhost only) ----------------
[program:ocr-worker]
command=/var/www/html/ocr-worker/.venv/bin/uvicorn app.main:app --host 127.0.0.1 --port 8077
directory=/var/www/html/ocr-worker
user=www-data
autostart=true
autorestart=true
startsecs=5
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- Queue worker -----------------------------------------------------------
# `linkportal` is listed first and is where the OCR pipeline is dispatched: the
# `jobs` table is shared with ghelpdesk, so a job left on `default` can be
# claimed by that app's worker, which cannot resolve this app's job classes and
# fails it — leaving the document stuck in `received` with no error shown here.
[program:queue-worker]
command=php /var/www/html/artisan queue:work --queue=linkportal,default,imports --sleep=5 --tries=1 --timeout=3600 --max-time=3500
directory=/var/www/html
user=www-data
autostart=true
autorestart=true
stopwaitsecs=3610
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- Scheduler (email intake every 2 min, overdue sweep daily) --------------
[program:scheduler]
command=bash -c "while true; do php /var/www/html/artisan schedule:run --no-interaction; sleep 60; done"
directory=/var/www/html
user=www-data
autostart=true
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
